name: Notification Cron

on:
    schedule:
        # Once a day at 15:00 UTC (8am Pacific in summer/PDT) -- deliberately
        # slower than the scraper's 15-min cadence. The PRD's "prioritize
        # speed over batching" was superseded by an explicit user choice
        # (2026-07-19) to avoid frequent emails; see research/mvp-checklist.md.
        - cron: "0 15 * * *"
    workflow_dispatch: # Adds a button to run it manually from the GitHub UI

jobs:
    run-notify:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: pip install -r scraper/requirements.txt
              # No Playwright browser install here -- notify.py never
              # touches the scraping code path, so skipping it keeps this
              # workflow fast and independent of the scraper's runtime.

            - name: Run notification check
              env:
                  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
                  RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
              run: python scraper/notify.py
