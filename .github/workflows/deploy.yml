name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "scraper/**"
      - "app/**"
      - "utils/**"
      - "middleware.ts"
      - "next.config.ts"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC -- no long-lived AWS keys in secrets
  contents: read

env:
  AWS_REGION: us-west-2

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      scraper: ${{ steps.filter.outputs.scraper }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scraper:
              - 'scraper/**'
            frontend:
              - 'app/**'
              - 'utils/**'
              - 'middleware.ts'
              - 'next.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'Dockerfile'

  test-backend:
    needs: changes
    if: needs.changes.outputs.scraper == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r scraper/requirements-dev.txt

      - name: Run pytest
        working-directory: scraper
        run: python3 -m pytest tests/ -q

  typecheck:
    needs: changes
    if: needs.changes.outputs.scraper == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/typecheck.yml

  dry-run-scrape:
    needs: changes
    if: needs.changes.outputs.scraper == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Dry-run scrape end-to-end (real sites, no DB writes)
        working-directory: scraper
        run: python3 main.py --dry-run --max-pages 1
        # --dry-run skips get_supabase() entirely (see main.py), so this
        # needs no Supabase secrets -- but it still hits every real dealer
        # site + Craigslist search live, capped to 1 page each so it stays
        # fast. Catches the class of bug a mocked/fixture-only test can't:
        # a site's markup changing, a dealer going down, a real network
        # failure -- the exact gap that let the process-hang bug ship
        # unnoticed (dry-run's *lack* of a real Supabase call was the
        # blind spot there; this job's purpose is the opposite kind of
        # coverage, real network + real markup, no real DB writes).

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - run: npm ci
      - run: npm test

  deploy-scraper:
    needs: [changes, test-backend, typecheck, dry-run-scrape]
    if: needs.changes.outputs.scraper == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push scraper image
        working-directory: scraper
        env:
          REPO: ${{ steps.ecr-login.outputs.registry }}/used-cars-finder-scraper
        run: |
          docker build -t "$REPO:${{ github.sha }}" -t "$REPO:latest" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"

      - name: Register new task definition revisions
        env:
          REPO: ${{ steps.ecr-login.outputs.registry }}/used-cars-finder-scraper
        run: |
          for family in used-cars-finder-scrape used-cars-finder-notify; do
            aws ecs describe-task-definition --task-definition "$family" --query 'taskDefinition' \
              | jq --arg IMAGE "$REPO:${{ github.sha }}" \
                '.containerDefinitions[0].image = $IMAGE
                 | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
              > task-def.json
            aws ecs register-task-definition --cli-input-json file://task-def.json
          done
          # EventBridge Scheduler targets the family (no revision), so the
          # very next scheduled run picks this up automatically -- no
          # further deploy step needed.

  deploy-frontend:
    needs: [changes, test-frontend]
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build and push frontend image
        env:
          REPO: ${{ steps.ecr-login.outputs.registry }}/used-cars-finder-frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ vars.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}" \
            -t "$REPO:${{ github.sha }}" -t "$REPO:latest" .
          docker push "$REPO:${{ github.sha }}"
          docker push "$REPO:latest"
          # App Runner's auto_deployments_enabled picks up the new
          # :latest push on its own -- no explicit deploy call needed.
